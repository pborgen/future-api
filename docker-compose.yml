services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: future
      POSTGRES_PASSWORD: future
      POSTGRES_DB: future
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U future -d future"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://future:future@postgres:5432/future?sslmode=disable
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
